name: FreshGrocer CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Download source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # 3. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, xdebug

      # 4. Install Composer Dependencies
      - name: Install PHP Dependencies
        working-directory: frontend
        run: composer install

      # 5. Compile Java Backend
      - name: Compile Backend
        working-directory: backend/src
        run: |
          javac Main.java OrderHandler.java OrderHandlerTest.java

      # 6. Start Java Backend
      - name: Start Backend Server
        working-directory: backend/src
        run: |
          java Main &
          sleep 5

      # 7. Start PHP Server
      - name: Start PHP Server
        working-directory: frontend
        run: |
          php -S localhost:8000 &
          sleep 5

      # 8. Java Unit Testing
      - name: Java Unit Testing
        working-directory: backend/src
        run: |
          java OrderHandlerTest

      # 9. PHP Unit & Integration Testing
      - name: PHP Unit & Integration Testing
        working-directory: frontend
        run: |
          php vendor/bin/phpunit

      # 10. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 11. Run Cypress End-to-End Test
      - name: Cypress Run
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          browser: chrome
          wait-on: "http://localhost:8000"
