name: FreshGrocer CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Download source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, xdebug

      # 4. Install Composer Dependencies
      - name: Install PHP Dependencies
        working-directory: frontend
        run: composer install

      # 5. Start Java Backend
      - name: Compile Backend
        working-directory: backend/src
        run: javac Main.java OrderHandler.java

      - name: Start Backend Server
        working-directory: backend/src
        run: |
          java Main &
          sleep 5

      # 6. Start PHP Server
      - name: Start PHP Server
        working-directory: frontend
        run: |
          php -S localhost:8000 &
          sleep 5

      # 7. Run Java Unit Test
      - name: Java Unit Testing
        working-directory: backend/src
        run: |
          javac OrderHandlerTest.java
          java OrderHandlerTest

      # 8. Run PHPUnit Tests
      - name: PHP Unit & Integration Testing
        working-directory: frontend
        run: php vendor/bin/phpunit

      # 9. Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 10. Install Cypress
      - name: Install Cypress
        working-directory: frontend
        run: npm install

      # 11. Run End-to-End Test
      - name: Run Cypress
        working-directory: frontend
        run: npx cypress run --headless
